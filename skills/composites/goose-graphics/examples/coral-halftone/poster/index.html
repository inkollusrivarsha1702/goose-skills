<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>5 Tips for Building a Startup in 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-coral: #F36B5B;
            --c-espresso: #3D1A14;
            --c-bark: #5C2A20;
            --font: 'Archivo', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1080px; height: 1350px; overflow: hidden; -webkit-font-smoothing: antialiased; }
        body { background: var(--c-coral); color: var(--c-espresso); font-family: var(--font); padding: 56px 56px 48px; position: relative; }
    </style>
</head>
<body>

    <p style="font-family: var(--font); font-size: 14px; font-weight: 600; letter-spacing: 0.4px; color: #3D1A14; margin: 0 0 28px;">Founder&trade; Brief Inc.</p>

    <!-- Halftone dot grid: generated by JS to keep the file compact -->
    <svg id="halftone" viewBox="0 0 968 880" width="968" height="880" style="display: block;"></svg>
    <script>
        (function() {
            const svg = document.getElementById('halftone');
            const ns = 'http://www.w3.org/2000/svg';
            const cols = 38;
            const rows = 36;
            const cellW = 968 / cols;
            const cellH = 880 / rows;
            const cx0 = cols / 2;
            const cy0 = rows / 2 - 2;
            const fragments = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const dx = (x - cx0) / cols;
                    const dy = (y - cy0) / rows;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    let intensity = Math.max(0, 1 - dist * 2.4);
                    intensity += Math.max(0, 0.45 - Math.abs(dy + 0.05) * 1.6) * 0.6;
                    intensity = Math.min(1, intensity);
                    const r = 1.0 + intensity * 8.5;
                    const c = document.createElementNS(ns, 'circle');
                    c.setAttribute('cx', (x + 0.5) * cellW);
                    c.setAttribute('cy', (y + 0.5) * cellH);
                    c.setAttribute('r', r.toFixed(2));
                    c.setAttribute('fill', '#3D1A14');
                    fragments.push(c);
                }
            }
            fragments.forEach(f => svg.appendChild(f));
        })();
    </script>

    <div style="position: absolute; bottom: 48px; left: 56px; right: 56px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;">
        <h2 style="font-family: var(--font); font-size: 56px; font-weight: 800; line-height: 1.00; letter-spacing: -1px; color: #3D1A14; margin: 0;">
            Tips for<br>Startup<br>Founders
        </h2>
        <p style="font-family: var(--font); font-size: 360px; font-weight: 800; line-height: 0.85; letter-spacing: -10px; color: #3D1A14; margin: 0; transform: translateY(28px);">5</p>
    </div>

</body>
</html>
