<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>5 Tips for Building a Startup in 2026 — Cover</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-sage: #7BA88E;
            --color-white: #FFFFFF;
            --color-dark: #1A1A1A;
            --color-pale: #E8F0EC;
            --color-accent: #2C3E35;

            --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;

            --story-width: 1080px;
            --story-height: 1920px;
            --story-padding-x: 60px;
            --story-padding-y: 120px;
            --safe-top: 160px;
            --safe-bottom: 160px;
            --content-max-width: 960px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--color-sage);
            color: var(--color-white);
            font-family: var(--font-body);
            position: relative;
        }

        /* Progress segments */
        .progress {
            position: absolute;
            top: 60px;
            left: 60px;
            right: 60px;
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .progress .segment {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .progress .segment.active {
            background: rgba(255, 255, 255, 0.9);
        }

        /* Hero title */
        .hero-title {
            position: absolute;
            top: 220px;
            left: 60px;
            right: 60px;
            font-family: var(--font-display);
            font-size: 168px;
            font-weight: 700;
            line-height: 0.92;
            letter-spacing: -5px;
            color: var(--color-white);
            z-index: 2;
        }

        /* Metadata pill */
        .meta-pill {
            position: absolute;
            top: 740px;
            left: 60px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--color-white);
            color: var(--color-dark);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 4px;
            z-index: 3;
        }

        /* Accent rule below pill */
        .accent-rule {
            position: absolute;
            top: 820px;
            left: 60px;
            width: 80px;
            height: 2px;
            background: rgba(255,255,255,0.40);
            z-index: 3;
        }

        /* Big number block */
        .big-number {
            position: absolute;
            top: 880px;
            left: 60px;
            right: 60px;
            z-index: 3;
        }

        .big-number .num {
            font-family: var(--font-display);
            font-size: 320px;
            font-weight: 700;
            line-height: 0.85;
            letter-spacing: -10px;
            color: var(--color-white);
        }

        .big-number .num-label {
            margin-top: 28px;
            font-family: var(--font-body);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.4;
        }

        /* Sub label */
        .sub-label {
            position: absolute;
            bottom: 320px;
            left: 60px;
            right: 60px;
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 500;
            line-height: 1.25;
            letter-spacing: -0.5px;
            color: rgba(255, 255, 255, 0.90);
            z-index: 3;
        }

        /* Branding footer */
        .brand {
            position: absolute;
            bottom: 192px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-body);
            font-size: 22px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.5px;
            white-space: nowrap;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Progress bar (slide 1 of 6) -->
    <div class="progress">
        <div class="segment active"></div>
        <div class="segment"></div>
        <div class="segment"></div>
        <div class="segment"></div>
        <div class="segment"></div>
        <div class="segment"></div>
    </div>

    <!-- Hero title -->
    <h1 class="hero-title">Startup<br>in 2026.</h1>

    <!-- Metadata pill -->
    <div class="meta-pill">2026 FOUNDER GUIDE</div>

    <!-- Accent rule -->
    <div class="accent-rule"></div>

    <!-- Big number -->
    <div class="big-number">
        <div class="num">5</div>
        <div class="num-label">Tips for<br/>building in 2026</div>
    </div>

    <!-- Sub label -->
    <div class="sub-label">Five lessons from operators shipping in the AI-native year.</div>

    <!-- Branding -->
    <div class="brand">@gooseworks</div>

</body>
</html>
