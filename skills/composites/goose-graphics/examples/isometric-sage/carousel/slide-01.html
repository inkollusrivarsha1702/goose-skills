<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Slide 01 — Cover</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-sage: #7BA88E;
            --color-white: #FFFFFF;
            --color-dark: #1A1A1A;
            --color-pale: #E8F0EC;
            --color-accent: #2C3E35;

            --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;

            --slide-width: 1080px;
            --slide-height: 1080px;
            --slide-padding: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: var(--slide-width);
            height: var(--slide-height);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--color-sage);
            color: var(--color-white);
            font-family: var(--font-body);
            position: relative;
            padding: var(--slide-padding);
        }

        /* =========================
           METADATA ROW — TOP
           ========================= */
        .meta-row {
            position: absolute;
            top: 60px;
            left: 60px;
            right: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
        }

        .meta-pill {
            display: inline-block;
            background: var(--color-white);
            color: var(--color-dark);
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 8px 16px;
            border-radius: 4px;
        }

        .meta-caption {
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.70);
        }

        /* =========================
           HERO TITLE
           ========================= */
        .hero-title {
            position: absolute;
            top: 200px;
            left: 60px;
            right: 60px;
            font-family: var(--font-display);
            font-size: 152px;
            font-weight: 700;
            line-height: 0.90;
            letter-spacing: -5px;
            color: var(--color-white);
            z-index: 3;
        }

        /* Small accent rule */
        .accent-rule {
            position: absolute;
            top: 560px;
            left: 60px;
            width: 80px;
            height: 2px;
            background: rgba(255,255,255,0.45);
            z-index: 4;
        }

        .hero-caption {
            position: absolute;
            top: 600px;
            left: 60px;
            right: 60px;
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 500;
            line-height: 1.30;
            letter-spacing: -0.5px;
            color: rgba(255,255,255,0.85);
            max-width: 760px;
            z-index: 3;
        }

        /* =========================
           BOTTOM META STRIP
           ========================= */
        .bottom-strip {
            position: absolute;
            bottom: 60px;
            left: 60px;
            right: 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 5;
        }

        .bottom-card {
            background: var(--color-pale);
            color: var(--color-dark);
            padding: 14px 20px;
            border-radius: 4px;
            max-width: 360px;
        }

        .bottom-card .card-label {
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--color-accent);
            margin-bottom: 4px;
        }

        .bottom-card .card-text {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 500;
            line-height: 1.35;
            color: var(--color-dark);
        }

        .brand {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--color-white);
        }
    </style>
</head>
<body>

    <!-- TOP META ROW -->
    <div class="meta-row">
        <span class="meta-pill">Founder&#39;s Playbook</span>
        <span class="meta-caption">ISSUE 01 &middot; 2026</span>
    </div>

    <!-- HERO TITLE -->
    <h1 class="hero-title">Startup.</h1>

    <!-- Accent rule -->
    <div class="accent-rule"></div>

    <!-- Hero caption -->
    <p class="hero-caption">Building a company in 2026 &mdash; what actually works when AI is everywhere.</p>

    <!-- BOTTOM STRIP -->
    <div class="bottom-strip">
        <div class="bottom-card">
            <p class="card-label">5 Tips &middot; Carousel</p>
            <p class="card-text">Building a company in 2026 &mdash; what actually works when AI is everywhere.</p>
        </div>
        <span class="brand">@goose &middot; 01 / 07</span>
    </div>

</body>
</html>
