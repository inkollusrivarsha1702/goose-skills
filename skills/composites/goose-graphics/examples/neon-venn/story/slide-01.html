<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>5 Tips — Neon Venn (Story)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-canvas: #0E0F11;
      --color-lime: #D6FF3D;
      --color-white: #FFFFFF;
      --color-white-72: rgba(255,255,255,0.72);
      --color-white-45: rgba(255,255,255,0.45);
      --color-rule: rgba(255,255,255,0.28);
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1920px; overflow: hidden;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    body { background: var(--color-canvas); padding: 80px 72px; font-family: var(--font-body); color: var(--color-white); position: relative; }
    .brand { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .col-cap { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: var(--color-white-45); }
    .pill { display: inline-block; background: var(--color-lime); color: var(--color-canvas); font-family: var(--font-body); font-size: 14px; font-weight: 600; padding: 10px 20px; border-radius: 999px; margin: 0 6px 12px 0; }
    .num { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--color-white-45); letter-spacing: 0.4px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:20px; border-bottom:1.5px solid var(--color-rule);">
    <p class="brand">FOUNDERS.</p>
    <p class="col-cap">No. 026</p>
  </div>

  <!-- Hero -->
  <div style="margin-top:120px;">
    <p class="col-cap">2026 Playbook</p>
    <h1 style="font-family:var(--font-display); font-size:128px; font-weight:600; letter-spacing:-3px; line-height:0.96; color:var(--color-white); margin-top:18px;">
      5 Tips<br>for Building<br>a Startup<span style="color:var(--color-lime);">.</span>
    </h1>
    <p style="font-family:var(--font-body); font-size:18px; font-weight:400; line-height:1.55; color:var(--color-white-72); max-width:560px; margin-top:24px;">
      Five moves the operators of 2026 keep coming back to.
    </p>
  </div>

  <!-- Pill stack between two hairline rules -->
  <div style="margin-top:120px; padding:48px 0; border-top:1.5px solid var(--color-rule); border-bottom:1.5px solid var(--color-rule);">
    <p class="col-cap" style="margin-bottom:32px;">The 5 Pills</p>
    <div style="display:flex; gap:16px; align-items:center; margin-bottom:18px;">
      <p class="num" style="width:28px;">01</p>
      <span class="pill" style="margin:0;">Ship fast, learn faster</span>
    </div>
    <div style="display:flex; gap:16px; align-items:center; margin-bottom:18px;">
      <p class="num" style="width:28px;">02</p>
      <span class="pill" style="margin:0;">Build AI into the core</span>
    </div>
    <div style="display:flex; gap:16px; align-items:center; margin-bottom:18px;">
      <p class="num" style="width:28px;">03</p>
      <span class="pill" style="margin:0;">Hire for leverage</span>
    </div>
    <div style="display:flex; gap:16px; align-items:center; margin-bottom:18px;">
      <p class="num" style="width:28px;">04</p>
      <span class="pill" style="margin:0;">Obsess over 10 users</span>
    </div>
    <div style="display:flex; gap:16px; align-items:center;">
      <p class="num" style="width:28px;">05</p>
      <span class="pill" style="margin:0;">Revenue beats runway</span>
    </div>
  </div>

  <!-- Footer -->
  <div style="position:absolute; bottom:80px; left:72px; right:72px; display:flex; justify-content:space-between; align-items:center; padding-top:20px; border-top:1.5px solid var(--color-rule);">
    <p class="brand">FOUNDERS.</p>
    <p class="col-cap">2026 / Vol. 01</p>
  </div>

</body>
</html>
