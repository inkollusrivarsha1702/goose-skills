<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Venn — Carousel 01</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; background: #0E0F11; font-family: 'Inter', sans-serif; }
  .canvas { position: relative; width: 1080px; height: 1080px; padding: 72px; }
  .top-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.10); }
  .brand { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: #fff; }
  .meta { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(255,255,255,0.45); }
  .eyebrow { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-top: 56px; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: 80px; font-weight: 600; line-height: 0.98; letter-spacing: -2.2px; color: #fff; margin-top: 14px; }
  h1 .lime { color: #D6FF3D; }
  .lead { font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.55; color: rgba(255,255,255,0.72); margin-top: 22px; max-width: 540px; }

  .venn { position: absolute; left: 60px; top: 480px; width: 960px; height: 480px; }
  .col-cap { position: absolute; top: 0; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(255,255,255,0.45); }
  .ring { position: absolute; border: 1.5px solid rgba(255,255,255,0.28); background: rgba(255,255,255,0.10); border-radius: 50%; }
  .pill { position: absolute; background: #D6FF3D; color: #0E0F11; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 20px; border-radius: 999px; white-space: nowrap; }

  .footer { position: absolute; left: 72px; right: 72px; bottom: 56px; display: flex; justify-content: space-between; align-items: center; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.10); }
  .footer-l { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .footer-r { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: rgba(255,255,255,0.45); }
  .swipe { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.6px; text-transform: uppercase; color: #D6FF3D; }
</style>
</head>
<body>
<div class="canvas">
  <div class="top-row">
    <span class="brand">FOUNDERS<span style="color:#D6FF3D">.</span></span>
    <span class="meta">CAROUSEL / 01 OF 06</span>
  </div>

  <p class="eyebrow">2026 Field Guide</p>
  <h1>5 Tips for<br>Building a<br>Startup<span class="lime">.</span></h1>
  <p class="lead">Where velocity, leverage, and discipline overlap — that's the founder's job in 2026.</p>

  <div class="venn">
    <p class="col-cap" style="left: 80px;">Velocity</p>
    <p class="col-cap" style="left: 410px;">Leverage</p>
    <p class="col-cap" style="left: 760px;">Discipline</p>

    <div class="ring" style="top: 38px; left: 0; width: 400px; height: 400px;"></div>
    <div class="ring" style="top: 38px; left: 280px; width: 400px; height: 400px;"></div>
    <div class="ring" style="top: 38px; left: 560px; width: 400px; height: 400px;"></div>

    <span class="pill" style="top: 170px; left: 30px;">Ship fast</span>
    <span class="pill" style="top: 260px; left: 60px;">10 users</span>
    <span class="pill" style="top: 200px; left: 360px;">AI core</span>
    <span class="pill" style="top: 320px; left: 320px;">Leverage</span>
    <span class="pill" style="top: 240px; left: 700px;">Revenue</span>
  </div>

  <div class="footer">
    <span class="footer-l">FOUNDERS<span style="color:#D6FF3D">.</span></span>
    <span class="swipe">Swipe →</span>
  </div>
</div>
</body>
</html>
