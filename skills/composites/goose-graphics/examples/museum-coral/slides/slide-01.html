<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>5 Tips for Building a Startup in 2026 — museum-coral</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-coral: #F0978B;
      --c-coral-mid: #E37869;
      --c-cream: #F8DDD6;
      --c-plum: #3F0E18;
      --c-plum-mid: #5C1626;
      --font-display: 'Oswald', 'Helvetica Condensed', Helvetica, Arial, sans-serif;
      --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      background: var(--c-coral);
      color: var(--c-plum);
      font-family: var(--font-body);
      position: relative;
      padding: 96px;
    }
    .frame {
      position: absolute;
      top: 32px; left: 32px; right: 32px; bottom: 32px;
      border: 2px solid var(--c-coral-mid);
      pointer-events: none;
    }
    .layout {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 96px;
      height: calc(100% - 48px);
      align-items: center;
    }
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .title {
      font-family: var(--font-display);
      font-size: 144px;
      font-weight: 700;
      line-height: 0.94;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--c-plum);
      margin: 0;
    }
    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }
    .date-plate {
      background: var(--c-plum);
      color: var(--c-cream);
      padding: 18px 24px;
      display: inline-block;
    }
    .date-plate-label {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      line-height: 0.95;
      margin: 0;
    }
    .date-plate-year {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      line-height: 0.95;
      margin: 6px 0 0;
    }
    .supporting {
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--c-plum-mid);
      margin: 32px 0 0;
      line-height: 1.4;
    }
    .tips {
      margin-top: 48px;
      width: 100%;
      max-width: 720px;
    }
    .tip-row {
      display: flex;
      align-items: baseline;
      gap: 28px;
      padding: 16px 0;
      border-top: 1px solid var(--c-coral-mid);
    }
    .tip-row:last-child {
      border-bottom: 1px solid var(--c-coral-mid);
    }
    .tip-num {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--c-plum-mid);
      min-width: 44px;
    }
    .tip-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--c-plum);
      margin: 0;
      flex: 1;
    }
  </style>
</head>
<body>

  <div class="frame"></div>

  <div class="layout">
    <!-- Left: title -->
    <div class="left">
      <h1 class="title">5 TIPS<br>FOR BUILDING<br>A STARTUP</h1>
    </div>

    <!-- Right: edition plate + tips list -->
    <div class="right">
      <div class="date-plate">
        <p class="date-plate-label">EDITION</p>
        <p class="date-plate-year">2026</p>
      </div>
      <p class="supporting">SALA DE FUNDADORES CONTEMPORÁNEOS</p>
      <div class="tips">
        <div class="tip-row"><span class="tip-num">01</span><p class="tip-title">Start Before You're Ready</p></div>
        <div class="tip-row"><span class="tip-num">02</span><p class="tip-title">Talk To Ten Customers A Week</p></div>
        <div class="tip-row"><span class="tip-num">03</span><p class="tip-title">Narrow The Problem</p></div>
        <div class="tip-row"><span class="tip-num">04</span><p class="tip-title">Burn Rate Is The Enemy</p></div>
        <div class="tip-row"><span class="tip-num">05</span><p class="tip-title">Hire Character, Teach Skill</p></div>
      </div>
    </div>
  </div>

</body>
</html>
