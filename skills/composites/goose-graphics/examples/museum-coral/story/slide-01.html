<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>5 Tips for Building a Startup in 2026 — museum-coral</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-coral: #F0978B;
      --c-coral-mid: #E37869;
      --c-cream: #F8DDD6;
      --c-plum: #3F0E18;
      --c-plum-mid: #5C1626;
      --font-display: 'Oswald', 'Helvetica Condensed', Helvetica, Arial, sans-serif;
      --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1920px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      background: var(--c-coral);
      color: var(--c-plum);
      font-family: var(--font-body);
      position: relative;
      padding: 80px;
    }
    .frame {
      position: absolute;
      top: 32px; left: 32px; right: 32px; bottom: 32px;
      border: 2px solid var(--c-coral-mid);
      pointer-events: none;
    }
    .top-row {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 32px;
    }
    .title {
      font-family: var(--font-display);
      font-size: 100px;
      font-weight: 700;
      line-height: 0.94;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--c-plum);
      margin: 0;
    }
    .date-plate {
      background: var(--c-plum);
      color: var(--c-cream);
      padding: 14px 18px;
      display: inline-block;
    }
    .date-plate-label {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      line-height: 0.95;
      margin: 0;
    }
    .date-plate-year {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      line-height: 0.95;
      margin: 6px 0 0;
    }
    .tips {
      position: absolute;
      left: 80px;
      right: 80px;
      bottom: 200px;
      z-index: 2;
    }
    .tip-row {
      border-top: 1px solid var(--c-plum-mid);
      padding: 18px 0;
      display: flex;
      gap: 28px;
      align-items: baseline;
    }
    .tip-row:last-child { border-bottom: 1px solid var(--c-plum-mid); }
    .tip-num {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--c-plum);
      margin: 0;
      min-width: 70px;
    }
    .tip-text {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--c-plum);
      margin: 0;
      line-height: 1.05;
    }
  </style>
</head>
<body>

  <div class="frame"></div>

  <!-- Top: hero title + edition plate -->
  <div class="top-row">
    <h1 class="title">5 TIPS<br>FOR BUILDING<br>A STARTUP</h1>
    <div class="date-plate">
      <p class="date-plate-label">EDITION</p>
      <p class="date-plate-year">2026</p>
    </div>
  </div>

  <!-- Middle: intentional negative space (the coral field) -->

  <!-- Bottom: tips list -->
  <div class="tips">
    <div class="tip-row">
      <p class="tip-num">01</p>
      <p class="tip-text">Start before you're ready</p>
    </div>
    <div class="tip-row">
      <p class="tip-num">02</p>
      <p class="tip-text">Talk to ten customers a week</p>
    </div>
    <div class="tip-row">
      <p class="tip-num">03</p>
      <p class="tip-text">Narrow the problem relentlessly</p>
    </div>
    <div class="tip-row">
      <p class="tip-num">04</p>
      <p class="tip-text">Burn rate is the enemy of time</p>
    </div>
    <div class="tip-row">
      <p class="tip-num">05</p>
      <p class="tip-text">Hire character, teach skill</p>
    </div>
  </div>

</body>
</html>
