<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>5 Tips for Building a Startup in 2026 — museum-coral</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-coral: #F0978B;
      --c-coral-mid: #E37869;
      --c-cream: #F8DDD6;
      --c-plum: #3F0E18;
      --c-plum-mid: #5C1626;
      --font-display: 'Oswald', 'Helvetica Condensed', Helvetica, Arial, sans-serif;
      --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1080px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      background: var(--c-coral);
      color: var(--c-plum);
      font-family: var(--font-body);
      position: relative;
      padding: 80px;
    }
    .frame {
      position: absolute;
      top: 32px; left: 32px; right: 32px; bottom: 32px;
      border: 2px solid var(--c-coral-mid);
      pointer-events: none;
    }
    .head {
      position: relative;
      z-index: 2;
    }
    .eyebrow {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--c-plum-mid);
      margin: 0 0 12px;
    }
    .title {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--c-plum);
      margin: 0;
    }
    .rows {
      position: absolute;
      left: 80px;
      right: 80px;
      bottom: 120px;
      z-index: 2;
    }
    .row {
      display: flex;
      align-items: baseline;
      gap: 28px;
      border-top: 1px solid var(--c-coral-mid);
      padding: 20px 0;
    }
    .row:last-child { border-bottom: 1px solid var(--c-coral-mid); }
    .row-num {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--c-plum-mid);
      margin: 0;
      min-width: 40px;
    }
    .row-label {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--c-plum);
      margin: 0;
      flex: 1;
    }
    .row-score {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--c-plum);
      margin: 0;
      text-align: right;
      min-width: 100px;
    }
  </style>
</head>
<body>

  <div class="frame"></div>

  <!-- Top: eyebrow + title -->
  <div class="head">
    <p class="eyebrow">FOUNDER METRICS · 2026</p>
    <h1 class="title">5 FOUNDER TIPS<br>BY SCORE</h1>
  </div>

  <!-- Middle: intentional negative space -->

  <!-- Bottom: numbered rows -->
  <div class="rows">
    <div class="row">
      <p class="row-num">01</p>
      <p class="row-label">Ship speed</p>
      <p class="row-score">92</p>
    </div>
    <div class="row">
      <p class="row-num">02</p>
      <p class="row-label">Customer talks</p>
      <p class="row-score">78</p>
    </div>
    <div class="row">
      <p class="row-num">03</p>
      <p class="row-label">Focus depth</p>
      <p class="row-score">88</p>
    </div>
    <div class="row">
      <p class="row-num">04</p>
      <p class="row-label">Runway months</p>
      <p class="row-score">24</p>
    </div>
    <div class="row">
      <p class="row-num">05</p>
      <p class="row-label">Hire fit</p>
      <p class="row-score">84</p>
    </div>
  </div>

</body>
</html>
