<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    :root {

    .brand-vermilion { font-family: var(--font-display); font-size: 30px; font-weight: 600; letter-spacing: -0.4px; color: var(--color-vermilion); }
  </style>
</head>

  <div style="position:relative; height:920px; background:var(--color-onyx); padding:72px;">

    <p class="eyebrow-quiet" style="position:absolute; bottom:56px; left:64px;">A pdf Guide &middot; Studio Press</p>
