<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Story Cover — Vermilion Folio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-vermilion: #E83A19;
      --color-onyx: #0E0E0E;
      --color-cream: #F2EBE0;
      --color-cream-quiet: rgba(242,235,224,0.45);
      --color-mute: #7A7771;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1920px; overflow: hidden;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    body { background: var(--color-vermilion); padding: 80px; font-family: var(--font-body); }
    .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-cream); }
    .eyebrow-quiet { font-size: 12px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-cream-quiet); }
    .brand-vermilion { font-family: var(--font-display); font-size: 32px; font-weight: 600; letter-spacing: -0.4px; color: var(--color-vermilion); }
  </style>
</head>
<body>

  <div style="position:relative; height:1760px; background:var(--color-onyx); padding:80px 64px;">

    <p class="brand-vermilion" style="position:absolute; top:64px; right:64px;">studio</p>
    <p class="eyebrow" style="margin-bottom:96px;">A Founder's Field Guide &middot; 2026</p>

    <h1 style="font-family:var(--font-display); font-size:200px; font-weight:500; letter-spacing:-5px; line-height:0.96; color:var(--color-cream);">
      Five<br>Tips,<br>2026.
    </h1>

    <p style="font-size:22px; font-weight:500; line-height:1.30; color:var(--color-mute); margin-top:30px;">Version 1.0</p>

    <p style="font-family:var(--font-display); font-size:36px; font-weight:500; line-height:1.22; letter-spacing:-0.5px; color:var(--color-cream); max-width:720px; margin-top:60px;">
      A founder's field guide, distilled from twenty&#8209;three operators who shipped something that lasted.
    </p>

    <!-- Botanical cluster -->
    <svg width="480" height="440" viewBox="0 0 480 440" xmlns="http://www.w3.org/2000/svg" style="position:absolute; bottom:80px; right:48px;">
      <ellipse cx="320" cy="240" rx="84" ry="108" fill="#E83A19" stroke="#1F1F1F" stroke-width="2"/>
      <path d="M320 132 L320 348" stroke="#1F1F1F" stroke-width="1.5" fill="none"/>
      <path d="M264 216 Q320 200 376 216" stroke="#1F1F1F" stroke-width="1.2" fill="none"/>
      <path d="M264 264 Q320 280 376 264" stroke="#1F1F1F" stroke-width="1.2" fill="none"/>
      <circle cx="140" cy="320" r="68" fill="#E83A19" stroke="#1F1F1F" stroke-width="2"/>
      <path d="M140 252 L140 388" stroke="#1F1F1F" stroke-width="1.5" fill="none"/>
      <path d="M72 320 L208 320" stroke="#1F1F1F" stroke-width="1.5" fill="none"/>
      <path d="M88 272 L192 368" stroke="#1F1F1F" stroke-width="1.2" fill="none"/>
      <path d="M88 368 L192 272" stroke="#1F1F1F" stroke-width="1.2" fill="none"/>
      <path d="M400 100 Q428 132 420 180 Q396 156 388 116 Z" fill="#E83A19" stroke="#1F1F1F" stroke-width="2"/>
    </svg>

    <p class="eyebrow-quiet" style="position:absolute; bottom:64px; left:64px;">A pdf Guide &middot; Studio Press</p>

  </div>

</body>
</html>
