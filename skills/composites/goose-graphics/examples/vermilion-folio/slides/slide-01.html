<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Slide Cover — Vermilion Folio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-vermilion: #E83A19;
      --color-onyx: #0E0E0E;
      --color-cream: #F2EBE0;
      --color-cream-quiet: rgba(242,235,224,0.45);
      --color-mute: #7A7771;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px; overflow: hidden;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    body { background: var(--color-vermilion); padding: 80px; font-family: var(--font-body); }
    .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-cream); }
    .eyebrow-quiet { font-size: 12px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-cream-quiet); }
    .brand-vermilion { font-family: var(--font-display); font-size: 36px; font-weight: 600; letter-spacing: -0.4px; color: var(--color-vermilion); }
  </style>
</head>
<body>

  <div style="position:relative; height:920px; background:var(--color-onyx); padding:80px 96px;">

    <p class="brand-vermilion" style="position:absolute; top:64px; right:96px;">studio</p>
    <p class="eyebrow" style="margin-bottom:48px;">A Founder's Field Guide &middot; 2026</p>

    <h1 style="font-family:var(--font-display); font-size:208px; font-weight:500; letter-spacing:-5px; line-height:0.96; color:var(--color-cream); max-width:1200px;">
      Five Tips,<br>2026.
    </h1>

    <p style="font-size:24px; font-weight:500; line-height:1.30; color:var(--color-mute); margin-top:30px;">Version 1.0</p>

    <p style="font-family:var(--font-display); font-size:40px; font-weight:500; line-height:1.20; letter-spacing:-0.5px; color:var(--color-cream); max-width:760px; margin-top:48px;">
      A founder's field guide, distilled from twenty&#8209;three operators who shipped something that lasted.
    </p>

    <p class="eyebrow-quiet" style="position:absolute; bottom:64px; left:96px;">A pdf Guide &middot; Studio Press &middot; Edition 23</p>
    <p class="eyebrow-quiet" style="position:absolute; bottom:64px; right:96px;">No. 001 &middot; Vol. 1</p>

  </div>

</body>
</html>
