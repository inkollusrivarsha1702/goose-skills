<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>5 Tips for Building a Startup in 2026 — Halftone Mono Slide 01</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-ink: #0A0A0A;
    --color-white: #FFFFFF;
    --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    background: var(--color-ink);
    color: #fff;
    font-family: var(--font-body);
  }
  body {
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  .top {
    display: flex; align-items: center; justify-content: space-between;
  }
  .eyebrow {
    font-size: 13px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.40);
  }
  .slide-num {
    font-family: var(--font-display);
    font-size: 16px; font-weight: 600;
    color: rgba(255,255,255,0.55);
  }
  .center {
    display: flex; align-items: center; gap: 80px;
    flex: 1;
  }
  .stat {
    font-family: var(--font-display);
    font-size: 480px; font-weight: 700;
    line-height: 0.85; letter-spacing: -18px;
    flex-shrink: 0;
  }
  .text-side { flex: 1; max-width: 760px; }
  h1 {
    font-family: var(--font-display);
    font-size: 96px; font-weight: 700;
    line-height: 0.95; letter-spacing: -3px;
    margin-bottom: 32px;
  }
  .h1-sub {
    font-size: 22px; font-weight: 400;
    line-height: 1.55; color: rgba(255,255,255,0.70);
  }
  .accent-bar {
    width: 80px; height: 4px; background: #fff;
    margin-bottom: 36px;
  }
  .halftone {
    display: grid;
    grid-template-columns: repeat(20, 12px);
    gap: 8px;
    flex-shrink: 0;
  }
  .halftone div { width: 12px; height: 12px; border-radius: 50%; }
  .bottom {
    display: flex; align-items: flex-end; justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.18);
    padding-top: 28px;
  }
  .desc {
    font-size: 16px; font-weight: 600;
    letter-spacing: 0.4px;
    color: rgba(255,255,255,0.70);
  }
  .desc strong { color: #fff; font-weight: 700; }
  .brand {
    font-family: var(--font-display);
    font-size: 24px; font-weight: 700;
    letter-spacing: -0.4px;
  }
</style>
</head>
<body>

  <div class="top">
    <span class="eyebrow">— STARTUP PLAYBOOK / 2026</span>
    <span class="slide-num">01 / 06</span>
  </div>

  <div class="center">
    <div class="text-side">
      <div class="accent-bar"></div>
      <div style="display:flex; align-items:flex-end; gap:48px;">
        <div class="stat">5</div>
        <div style="padding-bottom:48px;">
          <h1>Tips for<br>Building<br>a Startup.</h1>
        </div>
      </div>
      <p class="h1-sub" style="margin-top:36px;">What separates the founders who make it from those who don't — distilled from the operators shipping right now.</p>
    </div>
    <div class="halftone" id="halftone"></div>
  </div>

  <div class="bottom">
    <p class="desc">Essential tips every founder needs in <strong>2026</strong></p>
    <span class="brand">goose.</span>
  </div>

  <script>
    (function(){
      const el = document.getElementById('halftone');
      const cols = 20, rows = 24;
      let html = '';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const dx = (c - cols/2) / (cols/2);
          const dy = (r - rows/2) / (rows/2);
          const dist = Math.sqrt(dx*dx + dy*dy);
          const noise = Math.random();
          let op;
          if (dist < 0.35) op = 1.0;
          else if (dist < 0.6) op = noise > 0.3 ? 0.55 : 0.18;
          else if (dist < 0.85) op = noise > 0.55 ? 0.18 : 0.06;
          else op = 0.06;
          html += `<div style="background:rgba(255,255,255,${op});"></div>`;
        }
      }
      el.innerHTML = html;
    })();
  </script>

</body>
</html>
