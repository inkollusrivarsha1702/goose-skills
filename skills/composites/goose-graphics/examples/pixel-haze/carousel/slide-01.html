<style>
:root {
  --canvas:#E8E5E1;
  --card:#FFFFFF;
  --orange:#FF6A1A;
  --vermillion:#FF4D4D;
  --magenta:#E15CB6;
  --lavender:#C28BE6;
  --lilac:#E2C9F0;
  --peach:#F4D8C4;
  --ink:#1A1A1A;
  --ink-55:rgba(26,26,26,0.55);
  --ink-40:rgba(26,26,26,0.40);
  --pill:rgba(255,255,255,0.88);
  --font:'Inter',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
  --font-brand:'Space Grotesk',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1080px;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
body{background:var(--canvas);font-family:var(--font);color:var(--ink);padding:64px;}
.page{width:952px;height:952px;display:flex;flex-direction:column;}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-40);}
.brand{font-family:var(--font-brand);font-size:18px;font-weight:600;letter-spacing:-0.2px;color:var(--ink);}

.card{background:var(--card);border-radius:32px;box-shadow:0 12px 40px rgba(0,0,0,0.07);overflow:hidden;flex:1;display:flex;flex-direction:column;}

.mosaic{position:relative;height:430px;display:grid;grid-template-columns:repeat(20,1fr);grid-template-rows:repeat(11,1fr);}
.mosaic > div{display:block;}

.pill{position:absolute;background:var(--pill);color:var(--ink);font-size:12px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;padding:11px 20px;border-radius:999px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}

.body{padding:44px 52px;flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.title{font-size:64px;font-weight:700;line-height:1.05;letter-spacing:-2px;}
.subtitle{font-size:17px;color:var(--ink-55);line-height:1.55;max-width:760px;margin-top:14px;}
.foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:24px;}
.foot-mark{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-40);}
.swipe{font-family:var(--font-brand);font-size:13px;font-weight:600;letter-spacing:0.4px;color:var(--ink);}
</style>
</head>
