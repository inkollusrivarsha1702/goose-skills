<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Carousel Cover — Obsidian Bloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-onyx: #0A0A0A;
      --color-lime: #C5DD3D;
      --color-green-mid: #7BBE3F;
      --color-green-deep: #2F7C2A;
      --color-bone: #EDEAE0;
      --color-bone-quiet: rgba(237,234,224,0.55);
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Inter', -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1080px; overflow: hidden;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    body { background: var(--color-onyx); font-family: var(--font-body); padding: 80px; }
    .eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-bone); }
    .eyebrow-quiet { font-size: 10px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-bone-quiet); }
    .eyebrow-ink { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-onyx); }
    .brand-bone { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.5px; color: var(--color-bone); }
    .brand-ink { font-family: var(--font-display); font-size: 20px; font-weight: 500; letter-spacing: -0.5px; color: var(--color-onyx); }
  </style>
</head>
<body>

  <!-- Header -->
  <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:32px;">
    <p class="eyebrow">A Founder's Letter &middot; 2026</p>
    <p class="brand-bone">goose.</p>
  </div>

  <!-- Lime hero panel -->
  <div style="position:relative; height:760px; background:var(--color-lime); padding:60px 56px; overflow:hidden;">

    <!-- Blobs -->
    <div style="position:absolute; bottom:-100px; right:-80px; width:560px; height:420px; background:var(--color-green-mid); border-radius:62% 38% 70% 30% / 50% 60% 40% 50%;"></div>
    <div style="position:absolute; bottom:-40px; right:160px; width:340px; height:280px; background:var(--color-green-deep); border-radius:55% 45% 65% 35% / 60% 50% 50% 40%;"></div>
    <div style="position:absolute; top:-40px; left:-60px; width:240px; height:180px; background:var(--color-green-mid); border-radius:60% 40% 55% 45% / 55% 60% 40% 45%;"></div>

    <!-- Top metadata -->
    <div style="position:relative; display:flex; justify-content:space-between; align-items:flex-start;">
      <p class="eyebrow-ink">In Review &mdash; Five Lessons</p>
      <p class="brand-ink">2026 / 23</p>
    </div>

    <!-- Hero headline -->
    <h1 style="position:relative; font-family:var(--font-display); font-size:144px; font-weight:500; letter-spacing:-4px; line-height:0.93; color:var(--color-onyx); margin-top:64px;">
      Five Tips,<br>2026.
    </h1>

    <!-- Subhead -->
    <p style="position:relative; font-family:var(--font-display); font-size:26px; font-weight:500; line-height:1.25; letter-spacing:-0.6px; color:var(--color-onyx); max-width:480px; margin-top:30px;">
      Distilled from twenty&#8209;three operators who shipped something that lasted.
    </p>

    <!-- Bottom-right circular badge -->
    <div style="position:absolute; bottom:48px; right:56px; width:64px; height:64px; border-radius:50%; background:var(--color-onyx); display:flex; align-items:center; justify-content:center;">
      <p style="font-family:var(--font-display); font-size:18px; font-weight:500; color:var(--color-lime); letter-spacing:-0.5px;">'26</p>
    </div>

  </div>

  <!-- Footer caption -->
  <p class="eyebrow-quiet" style="margin-top:32px; text-align:center;">Slide 01 &middot; Swipe for the five tips &middot; (Research) Index No. 085</p>

</body>
</html>
