<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Story Cover — Obsidian Bloom</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-onyx: #0A0A0A;
      --color-lime: #C5DD3D;
      --color-green-mid: #7BBE3F;
      --color-green-deep: #2F7C2A;
      --color-bone: #EDEAE0;
      --color-bone-quiet: rgba(237,234,224,0.55);
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Inter', -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px; height: 1920px; overflow: hidden;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    body { background: var(--color-onyx); font-family: var(--font-body); padding: 80px; }
    .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-bone); }
    .eyebrow-quiet { font-size: 12px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-bone-quiet); }
    .eyebrow-ink { font-size: 13px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-onyx); }
    .brand-bone { font-family: var(--font-display); font-size: 26px; font-weight: 500; letter-spacing: -0.5px; color: var(--color-bone); }
  </style>
</head>
<body>

  <!-- Top header on black -->
  <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:32px;">
    <p class="eyebrow">A Founder's Letter</p>
    <p class="brand-bone">goose.</p>
  </div>

  <!-- Lime hero panel — large vertical -->
  <div style="position:relative; height:1480px; background:var(--color-lime); padding:80px 56px; overflow:hidden;">

    <!-- Blobs -->
    <div style="position:absolute; bottom:-180px; right:-120px; width:680px; height:540px; background:var(--color-green-mid); border-radius:62% 38% 70% 30% / 50% 60% 40% 50%;"></div>
    <div style="position:absolute; bottom:-100px; right:80px; width:440px; height:380px; background:var(--color-green-deep); border-radius:55% 45% 65% 35% / 60% 50% 50% 40%;"></div>
    <div style="position:absolute; top:-60px; left:-100px; width:340px; height:240px; background:var(--color-green-mid); border-radius:60% 40% 55% 45% / 55% 60% 40% 45%;"></div>
    <div style="position:absolute; top:520px; left:-60px; width:200px; height:160px; background:var(--color-green-deep); border-radius:55% 45% 60% 40% / 55% 60% 40% 45%;"></div>

    <div style="position:relative;">
      <p class="eyebrow-ink" style="margin-bottom:36px;">In Review &mdash; Five Lessons</p>
      <h1 style="font-family:var(--font-display); font-size:200px; font-weight:500; letter-spacing:-6px; line-height:0.92; color:var(--color-onyx);">
        Five<br>Tips,<br>2026.
      </h1>
      <p style="font-family:var(--font-display); font-size:38px; font-weight:500; line-height:1.20; letter-spacing:-0.8px; color:var(--color-onyx); max-width:720px; margin-top:48px;">
        A founder's letter, distilled from twenty&#8209;three operators who shipped something that lasted.
      </p>
    </div>

    <!-- Bottom-right circular badge -->
    <div style="position:absolute; bottom:64px; right:64px; width:96px; height:96px; border-radius:50%; background:var(--color-onyx); display:flex; align-items:center; justify-content:center;">
      <p style="font-family:var(--font-display); font-size:28px; font-weight:500; color:var(--color-lime); letter-spacing:-0.5px;">'26</p>
    </div>

  </div>

  <!-- Bottom black footer -->
  <div style="margin-top:32px; display:flex; justify-content:space-between; align-items:center;">
    <p class="eyebrow-quiet">Tap for tips 01&ndash;05</p>
    <p class="eyebrow-quiet">(Research) Index No. 085</p>
  </div>

</body>
</html>
