<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, initial-scale=1.0">
    <title>Carousel Slide 01 — Cobalt Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-cobalt: #2463E2;
            --color-white: #FFFFFF;
            --color-white-72: rgba(255,255,255,0.72);
            --color-white-45: rgba(255,255,255,0.45);
            --color-hairline-strong: rgba(255,255,255,0.20);
            --color-hairline-soft: rgba(255,255,255,0.10);
            --font-display: 'Space Grotesk', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            --font-body: 'Inter', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
            --font-italic: 'Fraunces', Georgia, 'Times New Roman', serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body {
            background: var(--color-cobalt);
            color: #fff;
            display: flex;
            flex-direction: column;
            padding: 72px;
        }
        .status-bar {
            display:flex; align-items:center; justify-content:space-between;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-hairline-strong);
        }
        .brand { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
        .tag { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--color-white-45); border:1px solid var(--color-hairline-strong); padding:5px 9px; margin-left:14px;}
        .issue { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--color-white-45); }

        .hero { padding-top: 60px; flex: 1; display: flex; flex-direction: column; }
        .eyebrow { font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--color-white-45); margin-bottom: 18px; }
        h1.headline {
            font-family: var(--font-display);
            font-size: 88px;
            font-weight: 500;
            line-height: 0.98;
            letter-spacing: -2.5px;
        }
        .em-italic { font-family: var(--font-italic); font-style: italic; font-weight: 400; text-decoration: underline; text-underline-offset: 6px; }

        .figures-row {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px;
            margin-top: 60px;
        }
        .fig {
            border: 1px solid var(--color-hairline-strong);
            position: relative;
            height: 220px;
            padding: 14px;
        }
        .fig-label { font-family: var(--font-body); font-size: 9px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-white-45); }
        .fig-canvas { position: absolute; inset: 36px 14px 56px 14px; }
        .node { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: #fff; transform: translate(-50%, -50%); }
        .node-hollow { background: transparent; border: 1px solid #fff; box-sizing: border-box; }
        .fig-caption { position: absolute; bottom: 14px; left: 14px; right: 14px; display: flex; gap: 10px; align-items: baseline; }
        .fig-num { font-family: var(--font-display); font-size: 12px; font-weight: 600; letter-spacing: 0.6px; color: var(--color-white-45); }
        .fig-title { font-family: var(--font-display); font-size: 16px; font-weight: 500; letter-spacing: -0.2px; color: #fff; }

        .footer-row {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--color-hairline-strong);
            display:flex; align-items: center; justify-content: space-between;
        }
        .footer-meta { display:flex; gap: 24px; }
        .footer-meta span { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--color-white-72); }
        .swipe { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--color-white-72); }
    </style>
</head>
<body>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <div style="display:flex; align-items:center;">
            <span class="brand">GOOSE</span>
            <span class="tag">EXPLAINED</span>
        </div>
        <span class="issue">SLIDE 01 / 06 &middot; NO. 014</span>
    </div>

    <!-- HERO HEADLINE -->
    <div class="hero">
        <span class="eyebrow">2026 STARTUP GUIDE</span>
        <h1 class="headline">Building a startup<br>is <span class="em-italic">not</span> a solo&nbsp;sport &rarr;</h1>

        <!-- Three figures -->
        <div class="figures-row">
            <div class="fig">
                <p class="fig-label">FIG. 01</p>
                <div class="fig-canvas">
                    <svg width="100%" height="100%" viewBox="0 0 200 130" preserveAspectRatio="none" style="position:absolute; inset:0;">
                        <line x1="40" y1="40" x2="80" y2="80" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="80" y1="80" x2="140" y2="60" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="140" y1="60" x2="160" y2="100" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="80" y1="80" x2="60" y2="115" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                    </svg>
                    <div class="node" style="left:20%; top:28%;"></div>
                    <div class="node" style="left:40%; top:60%;"></div>
                    <div class="node" style="left:70%; top:46%;"></div>
                    <div class="node node-hollow" style="left:80%; top:78%;"></div>
                    <div class="node node-hollow" style="left:30%; top:88%;"></div>
                    <div class="node node-hollow" style="left:62%; top:18%;"></div>
                </div>
                <div class="fig-caption">
                    <span class="fig-num">01</span>
                    <span class="fig-title">Fragmentation</span>
                </div>
            </div>

            <div class="fig">
                <p class="fig-label">FIG. 02</p>
                <div class="fig-canvas">
                    <svg width="100%" height="100%" viewBox="0 0 200 130" preserveAspectRatio="none" style="position:absolute; inset:0;">
                        <line x1="100" y1="65" x2="40" y2="30" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="100" y1="65" x2="160" y2="30" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="100" y1="65" x2="50" y2="100" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="100" y1="65" x2="160" y2="100" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="100" y1="65" x2="100" y2="15" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="100" y1="65" x2="100" y2="115" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="100" y1="65" x2="20" y2="65" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                        <line x1="100" y1="65" x2="180" y2="65" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
                    </svg>
                    <div class="node" style="left:50%; top:50%; width:8px; height:8px;"></div>
                    <div class="node" style="left:20%; top:23%;"></div>
                    <div class="node" style="left:80%; top:23%;"></div>
                    <div class="node" style="left:25%; top:77%;"></div>
                    <div class="node" style="left:80%; top:77%;"></div>
                    <div class="node" style="left:50%; top:11%;"></div>
                    <div class="node" style="left:50%; top:88%;"></div>
                    <div class="node" style="left:10%; top:50%;"></div>
                    <div class="node" style="left:90%; top:50%;"></div>
                </div>
                <div class="fig-caption">
                    <span class="fig-num">02</span>
                    <span class="fig-title">Connection</span>
                </div>
            </div>

            <div class="fig">
                <p class="fig-label">FIG. 03</p>
                <div class="fig-canvas">
                    <svg width="100%" height="100%" viewBox="0 0 200 130" preserveAspectRatio="none" style="position:absolute; inset:0;">
                        <line x1="40" y1="25" x2="160" y2="25" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
                        <line x1="40" y1="55" x2="160" y2="55" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
                        <line x1="40" y1="85" x2="160" y2="85" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
                        <line x1="40" y1="115" x2="160" y2="115" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
                        <line x1="40" y1="25" x2="40" y2="115" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
                        <line x1="80" y1="25" x2="80" y2="115" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
                        <line x1="120" y1="25" x2="120" y2="115" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
                        <line x1="160" y1="25" x2="160" y2="115" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
                    </svg>
                    <div class="node" style="left:20%; top:19%;"></div>
                    <div class="node" style="left:40%; top:19%;"></div>
                    <div class="node" style="left:60%; top:19%;"></div>
                    <div class="node" style="left:80%; top:19%;"></div>
                    <div class="node" style="left:20%; top:42%;"></div>
                    <div class="node" style="left:40%; top:42%;"></div>
                    <div class="node" style="left:60%; top:42%;"></div>
                    <div class="node" style="left:80%; top:42%;"></div>
                    <div class="node" style="left:20%; top:65%;"></div>
                    <div class="node" style="left:40%; top:65%;"></div>
                    <div class="node" style="left:60%; top:65%;"></div>
                    <div class="node" style="left:80%; top:65%;"></div>
                    <div class="node" style="left:20%; top:88%;"></div>
                    <div class="node" style="left:40%; top:88%;"></div>
                    <div class="node" style="left:60%; top:88%;"></div>
                    <div class="node" style="left:80%; top:88%;"></div>
                </div>
                <div class="fig-caption">
                    <span class="fig-num">03</span>
                    <span class="fig-title">Organization</span>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer-row">
        <div class="footer-meta">
            <span>Goose Technologies</span>
            <span>Strategy</span>
            <span>goose.ai</span>
        </div>
        <span class="swipe">SWIPE &rarr;</span>
    </div>

</body>
</html>
